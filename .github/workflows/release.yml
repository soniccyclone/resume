name: Build PDF and cut Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3-pip
          pip install -r requirements.txt --break-system-packages

      - name: Build HTML
        run: |
          pandoc Resume.org \
            --standalone \
            --css=style.css \
            --self-contained \
            --metadata title="Nathan Barlow" \
            --metadata subtitle="Senior Software Engineer" \
            -o resume.html

      - name: Render PDF
        run: weasyprint resume.html Nathan_Barlow_Resume.pdf

      - name: Compute release tag
        id: tag
        run: |
          DATE=$(date -u +%Y.%m.%d)
          SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${DATE}-${SHORT}" >> "$GITHUB_OUTPUT"
          echo "name=Resume ${DATE//./-}" >> "$GITHUB_OUTPUT"

      - name: Create release with PDF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            Nathan_Barlow_Resume.pdf \
            --title "${{ steps.tag.outputs.name }}" \
            --target "${{ github.sha }}" \
            --generate-notes
